<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — OLESER Verify</title>
<link rel="stylesheet" href="./assets/css/main.css">
<link rel="icon" href="./assets/img/favicon.svg" type="image/svg+xml">
<script>(function(){const t=localStorage.getItem('oleser_theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body>
<div class="bg-atm"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-orb bg-orb-3"></div></div>
<div class="bg-grid"></div>

<a href="/" style="position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:8px;color:var(--t2);text-decoration:none;font-size:13px;padding:8px 14px;background:var(--gf);border:1px solid var(--ge);border-radius:var(--r-full);backdrop-filter:blur(12px);transition:all var(--ease)" onmouseover="this.style.color='var(--t1)';this.style.borderColor='var(--geh)'" onmouseout="this.style.color='var(--t2)';this.style.borderColor='var(--ge)'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> กลับหน้าหลัก
</a>
<button onclick="const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('oleser_theme',t)" style="position:fixed;top:20px;right:20px;z-index:10;width:38px;height:38px;background:var(--gf);border:1px solid var(--ge);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);transition:all var(--ease)">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1">
  <div style="width:100%;max-width:420px">
    <div class="fade-up" style="text-align:center;margin-bottom:36px">
      <a href="/" style="text-decoration:none;display:inline-flex;align-items:center;gap:12px;color:var(--t1)">
                <div class="nav-logo-icon"><svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="2.8" fill="white"/><line x1="17.2" y1="12" x2="20" y2="12" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="16.5" y1="14.6" x2="18.93" y2="16" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="14.6" y1="16.5" x2="16" y2="18.93" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="12" y1="17.2" x2="12" y2="20" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="9.4" y1="16.5" x2="8" y2="18.93" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="7.5" y1="14.6" x2="5.07" y2="16" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="6.8" y1="12" x2="4" y2="12" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="7.5" y1="9.4" x2="5.07" y2="8" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="9.4" y1="7.5" x2="8" y2="5.07" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="12" y1="6.8" x2="12" y2="4" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="14.6" y1="7.5" x2="16" y2="5.07" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="16.5" y1="9.4" x2="18.93" y2="8" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg></div>
        <span style="font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:.06em">OLESER Verify</span>
              </a>
    </div>
    <div class="card p8 fade-up d1" id="login-card">
      <h1 style="font-family:var(--fd);font-size:24px;font-weight:700;margin-bottom:6px">ยินดีต้อนรับกลับ 👋</h1>
      <p style="color:var(--t2);font-size:14px;margin-bottom:24px">เข้าสู่ระบบเพื่อจัดการ API Key ของคุณ</p>
            <form method="POST" id="lf">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="fg">
            <label class="flabel" for="login">ชื่อผู้ใช้ หรือ อีเมล</label>
            <div class="iw">
              <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" class="fc" id="login" name="login" placeholder="username หรือ email@example.com" value="" autocomplete="username" autofocus required>
            </div>
          </div>
          <div class="fg">
            <div class="flex ic jb mb2"><label class="flabel" for="password" style="margin:0">รหัสผ่าน</label><a href="./forgot-password.html" style="font-size:12px;color:var(--brand);text-decoration:none">ลืมรหัสผ่าน?</a></div>
            <div class="iw">
              <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input type="password" class="fc" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="iico-r" onclick="togglePw('password',this)" aria-label="แสดง/ซ่อน"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
            </div>
          </div>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none">
            <input type="checkbox" name="remember" id="remember" style="width:16px;height:16px;accent-color:var(--brand);cursor:pointer">
            <span style="font-size:14px;color:var(--t2)">จดจำการเข้าสู่ระบบ</span>
          </label>
          <button type="submit" class="btn btn-primary wf" style="padding:13px" id="lbtn">เข้าสู่ระบบ</button>
        </div>
      </form>
      <div class="divider"></div>
      <p style="text-align:center;font-size:14px;color:var(--t2)">ยังไม่มีบัญชี? <a href="./register.html" style="color:var(--brand);text-decoration:none;font-weight:600">สมัครสมาชิก</a></p>
    </div>
  </div>
</div>
<div id="toast-root"></div>
<script src="./assets/js/main.js"></script>
<script>
function togglePw(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password'}
document.getElementById('lf').addEventListener('submit',function(e){
  if(!document.getElementById('login').value.trim()||!document.getElementById('password').value){e.preventDefault();return}
  const b=document.getElementById('lbtn');b.disabled=true;b.innerHTML='<span class="spin"></span> กำลังเข้าสู่ระบบ...'
})
</script>
</body></html>
