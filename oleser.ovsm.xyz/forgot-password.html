<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ลืมรหัสผ่าน — OLESER Verify</title>
<link rel="stylesheet" href="./assets/css/main.css">
<link rel="icon" href="./assets/img/favicon.svg" type="image/svg+xml">
<script>(function(){const t=localStorage.getItem('oleser_theme')||'dark';document.documentElement.setAttribute('data-theme',t)})()</script>
</head>
<body>
<div class="bg-atm"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
<div class="bg-grid"></div>
<a href="./login.html" style="position:fixed;top:20px;left:20px;z-index:10;display:flex;align-items:center;gap:8px;color:var(--t2);text-decoration:none;font-size:13px;padding:8px 14px;background:var(--gf);border:1px solid var(--ge);border-radius:var(--r-full);backdrop-filter:blur(12px);transition:all var(--ease)" onmouseover="this.style.color='var(--t1)'" onmouseout="this.style.color='var(--t2)'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> กลับ
</a>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1">
  <div style="width:100%;max-width:420px">
    <div class="fade-up" style="text-align:center;margin-bottom:32px">
      <a href="/" style="text-decoration:none;display:inline-flex;align-items:center;gap:12px;color:var(--t1)">
                <div class="nav-logo-icon"><svg viewBox="0 0 24 24" fill="none" width="18" height="18"><circle cx="12" cy="12" r="2.8" fill="white"/><line x1="17.2" y1="12" x2="20" y2="12" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="16.5" y1="14.6" x2="18.93" y2="16" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="14.6" y1="16.5" x2="16" y2="18.93" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="12" y1="17.2" x2="12" y2="20" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="9.4" y1="16.5" x2="8" y2="18.93" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="7.5" y1="14.6" x2="5.07" y2="16" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="6.8" y1="12" x2="4" y2="12" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="7.5" y1="9.4" x2="5.07" y2="8" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="9.4" y1="7.5" x2="8" y2="5.07" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="12" y1="6.8" x2="12" y2="4" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="14.6" y1="7.5" x2="16" y2="5.07" stroke="white" stroke-width="1.6" stroke-linecap="round"/><line x1="16.5" y1="9.4" x2="18.93" y2="8" stroke="white" stroke-width="1.6" stroke-linecap="round"/></svg></div>
        <span style="font-family:var(--fd);font-size:22px;font-weight:800;letter-spacing:.06em">OLESER Verify</span>
              </a>
    </div>
    <div class="card p8 fade-up d1">
      <h1 style="font-family:var(--fd);font-size:22px;font-weight:700;margin-bottom:6px">ลืมรหัสผ่าน 🔑</h1>
      <p style="color:var(--t2);font-size:14px;margin-bottom:24px">ทำตาม 3 ขั้นตอนเพื่อรีเซ็ตรหัสผ่าน</p>

      <!-- Step indicator -->
      <div class="step-row" style="margin-bottom:28px">
                <div class="step-dot cur">1</div>
        <div class="step-line "></div>                <div class="step-dot pend">2</div>
        <div class="step-line "></div>                <div class="step-dot pend">3</div>
                      </div>
      <div style="font-size:12px;color:var(--t3);margin-bottom:20px;text-align:center">ขั้นตอน 1/3 — ยืนยันตัวตน</div>

            
            <form method="POST">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="fg">
            <label class="flabel">ชื่อผู้ใช้ หรือ อีเมล</label>
            <div class="iw">
              <svg class="iico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input type="text" class="fc" name="identifier" placeholder="username หรือ email" autofocus required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary wf" style="padding:13px">ถัดไป →</button>
        </div>
      </form>
      
      <div class="divider"></div>
      <p style="text-align:center;font-size:14px;color:var(--t2)"><a href="./login.html" style="color:var(--brand);text-decoration:none">กลับไปเข้าสู่ระบบ</a></p>
    </div>
  </div>
</div>
<div id="toast-root"></div>
<script src="./assets/js/main.js"></script>
</body></html>
